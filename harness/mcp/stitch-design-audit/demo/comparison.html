<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stitch Design Audit — 비교 데모</title>
    <style>
      body {
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: #0f172a;
        color: white;
      }
      .header {
        text-align: center;
        padding: 40px 20px 20px;
      }
      .header h1 {
        font-size: 24px;
        margin: 0;
      }
      .header p {
        color: #94a3b8;
        margin: 8px 0 0;
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 24px;
        padding: 20px 40px 40px;
        max-width: 1400px;
        margin: 0 auto;
      }
      .card {
        background: #1e293b;
        border-radius: 12px;
        overflow: hidden;
      }
      .card-label {
        padding: 12px 16px;
        font-size: 13px;
        font-weight: 600;
        text-align: center;
      }
      .card-label.ref {
        background: #3b82f6;
      }
      .card-label.bad {
        background: #ef4444;
      }
      .card-label.good {
        background: #22c55e;
        color: #064e3b;
      }
      .card iframe {
        width: 100%;
        height: 520px;
        border: none;
        background: #f1f5f9;
      }
      .scores {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 24px;
        padding: 0 40px 40px;
        max-width: 1400px;
        margin: 0 auto;
      }
      .score-box {
        background: #1e293b;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }
      .score-num {
        font-size: 48px;
        font-weight: 800;
      }
      .score-num.ref {
        color: #3b82f6;
      }
      .score-num.bad {
        color: #ef4444;
      }
      .score-num.good {
        color: #22c55e;
      }
      @media (max-width: 900px) {
        .grid,
        .scores {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🎨 Stitch Design Audit — Before vs After</h1>
      <p>동일한 Stitch 디자인을 감사 없이 vs 감사 적용 후 구현한 결과 비교</p>
    </div>

    <div class="scores">
      <div class="score-box">
        <div class="score-num ref">REF</div>
        <div>Stitch 원본 디자인</div>
      </div>
      <div class="score-box">
        <div class="score-num bad">0점</div>
        <div>❌ 감사 없이 — 37건 위반</div>
      </div>
      <div class="score-box">
        <div class="score-num good">100점</div>
        <div>✅ 감사 적용 — 0건 위반</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-label ref">📐 Stitch 원본 (Reference)</div>
        <iframe src="stitch-reference.html"></iframe>
      </div>
      <div class="card">
        <div class="card-label bad">❌ WITHOUT Audit (37 violations)</div>
        <iframe src="impl-without-audit.html"></iframe>
      </div>
      <div class="card">
        <div class="card-label good">✅ WITH Audit (0 violations)</div>
        <iframe src="impl-with-audit.html"></iframe>
      </div>
    </div>
  </body>
</html>
